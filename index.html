<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">
                📊 JC Analytics
            </span>
        </div>
    </nav>

    <div class="container mt-5">

        <!-- Importação -->
        <div class="card shadow p-4">

            <h3 class="mb-4">Importar Planilhas</h3>

            <div class="mb-3">
                <label class="form-label">Produtos.xlsx</label>
                <input type="file"
                       id="produtos"
                       class="form-control"
                       accept=".xlsx">
            </div>

            <div class="mb-3">
                <label class="form-label">Vendas.xlsx</label>
                <input type="file"
                       id="vendas"
                       class="form-control"
                       accept=".xlsx">
            </div>

            <button id="btnDashboard"
                    class="btn btn-primary w-100">

                Gerar Dashboard

            </button>

        </div>

        <!-- Dashboard -->
        <div id="dashboard"
             class="mt-5 d-none">

            <div class="row g-3">

                <div class="col-md-3">
                    <div class="card shadow text-center p-3">
                        <h6>📦 Produtos</h6>
                        <h2 id="totalProdutos">0</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow text-center p-3">
                        <h6>🛒 Vendas</h6>
                        <h2 id="totalVendas">0</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow text-center p-3">
                        <h6>💰 Faturamento</h6>
                        <h2 id="faturamento">R$ 0,00</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow text-center p-3">
                        <h6>🚨 Produtos Críticos</h6>
                        <h2 id="criticos">0</h2>
                    </div>
                </div>

            </div>

            <hr class="my-4">

            <!-- Gráfico -->
            <div class="card shadow p-4">

                <h4>📈 Visão Geral</h4>

                <canvas id="grafico"></canvas>

            </div>

            <!-- Produtos Críticos -->
            <div class="card shadow p-4 mt-4">

                <h4>🚨 Produtos Críticos</h4>

                <div id="listaCriticos">

                    Nenhum produto analisado.

                </div>

            </div>

            <!-- Lista Inteligente -->
            <div class="card shadow p-4 mt-4">

                <h4>🛒 Lista Inteligente de Compras</h4>

                <div id="listaCompras">

                    Nenhum item calculado.

                </div>

            </div>

        </div>

    </div>

    <script src="js/estoque.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/motorCompra.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
